services:
  typescript-root:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: typescript-root
    restart: unless-stopped
    init: true
    # env_file: ./.env.local  # Uncomment if .env.local file exists
    ports:
      - "3000:3000"  # Next.js/Node app default port
    networks:
      - appnet
    depends_on:
      - python-python-agent
      # Add database dependencies here if needed

  python-python-agent:
    build:
      context: ./python-agent
      dockerfile: ./python-agent/Dockerfile
    container_name: python-python-agent
    restart: unless-stopped
    init: true
    # env_file: ./python-agent/.env  # Uncomment if .env file exists
    ports:
      - "8000:8000"  # Uvicorn/FastAPI default port
    networks:
      - appnet
    # Add database dependencies here if needed

# If your application requires a database (e.g., PostgreSQL), add it here:
