<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in to Copilot</title>
  <style type="text/css">
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
      color: #171717;
    }
    table {
      border-collapse: collapse;
    }
    .outer-wrapper {
      background-color: #ffffff;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .container {
      background-color: #f5f5f5;
      border-radius: 24px;
      padding: 40px;
      max-width: 100%;
    }
    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-section img {
      max-width: 200px;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .content {
      text-align: center;
    }
    .greeting {
      font-size: 24px;
      font-weight: 700;
      color: #171717;
      margin: 0 0 16px 0;
      letter-spacing: -0.5px;
    }
    .description {
      font-size: 16px;
      color: #737373;
      line-height: 1.6;
      margin: 0 0 32px 0;
    }
    .button-wrapper {
      margin: 32px 0;
    }
    .button {
      background-color: #0a0a0a;
      color: #ffffff;
      text-decoration: none;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      display: inline-block;
      letter-spacing: 0.3px;
      border: none;
      cursor: pointer;
    }
    .button:hover {
      background-color: #1a1a1a;
    }
    .footer-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e5e5e5;
      font-size: 14px;
      color: #737373;
      text-align: center;
    }
    .footer-text {
      margin: 8px 0;
      line-height: 1.6;
    }
    .copilot-sign {
      font-weight: 600;
      color: #171717;
      margin-top: 16px;
    }
    @media only screen and (max-width: 600px) {
      .outer-wrapper {
        padding: 20px 16px;
      }
      .container {
        padding: 28px 24px;
        border-radius: 20px;
      }
      .greeting {
        font-size: 20px;
      }
      .description {
        font-size: 15px;
      }
      .button {
        padding: 12px 24px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#ffffff">
    <tr>
      <td align="center">
        <div class="outer-wrapper">
          <table width="100%" cellpadding="0" cellspacing="0">
            <!-- Logo -->
            <tr>
              <td class="logo-section">
                <img src="https://copilot.energeticdebt.com/images/copilot-logo-gradient.svg" alt="Copilot" />
              </td>
            </tr>

            <!-- Content Box with Rounded Corners -->
            <tr>
              <td>
                <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#f5f5f5" style="border-radius: 24px; overflow: hidden;">
                  <tr>
                    <td style="padding: 40px;" class="container">
                      <div class="content">
                        <p class="greeting">Ready to log in?</p>
                        <p class="description">
                          Click the button below to securely access your Copilot account.
                        </p>

                        <div class="button-wrapper">
                          <a href="{{ .ConfirmationURL }}" class="button">Log in to Copilot</a>
                        </div>

                        <p class="description" style="font-size: 13px; color: #999999; margin-top: 24px;">
                          This link is valid for 24 hours.
                        </p>

                        <div class="footer-section">
                          <p class="footer-text">
                            Questions? Contact us at<br>
                            <strong>support@cliniccopilot.com</strong>
                          </p>
                          <p class="copilot-sign">
                            — The Copilot Team
                          </p>
                        </div>
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </div>
      </td>
    </tr>
  </table>
</body>
</html>
