version: '3.8'

services:
  python-agent:
    build: ./python-agent
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_CHAT_MODEL=${ANTHROPIC_CHAT_MODEL:-claude-sonnet-4-6}
      - ANTHROPIC_FAST_MODEL=${ANTHROPIC_FAST_MODEL:-claude-haiku-4-5-20251001}
      - ANTHROPIC_VISION_MODEL=${ANTHROPIC_VISION_MODEL:-claude-sonnet-4-6}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - FRONTEND_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - DEBUG=true
      - CORS_ORIGINS=["http://localhost:3000"]
      - REASONING_EFFORT=${REASONING_EFFORT:-high}
      - REASONING_SUMMARY=${REASONING_SUMMARY:-detailed}
      - CHAT_HISTORY_MESSAGE_LIMIT=${CHAT_HISTORY_MESSAGE_LIMIT:-400}
      - CHAT_HISTORY_CHAR_BUDGET=${CHAT_HISTORY_CHAR_BUDGET:-1800000}
    volumes:
      - ./python-agent:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
